# Smithery configuration file
# See: https://smithery.ai/docs/config#smitheryyaml

name: custom-mcp-server
version: 1.0.0
description: Custom MCP Server for Minecraft modding with advanced tooling support

# Server configuration
server:
  type: websocket
  port: 25565
  host: 0.0.0.0

# Authentication configuration
auth:
  type: token
  required: true

# Tool configuration
tools:
  clean_code:
    enabled: true
    config:
      line_length: 88
      use_black: true
      use_flake8: true
      use_mypy: true

# Environment variables
environment:
  - name: MCP_AUTH_TOKEN
    required: true
    description: Authentication token for MCP server
  - name: OPENAI_API_KEY
    required: true
    description: OpenAI API key for GPT-4 integration
  - name: LOG_LEVEL
    required: false
    default: INFO
    description: Logging level for the server

# Deployment configuration
deployment:
  type: serverless
  memory: 1024
  timeout: 300
  python_version: "3.9"
  requirements: requirements.txt

# Health check configuration
health:
  path: /health
  interval: 30
  timeout: 5
  retries: 3

build:
  # Use the Dockerfile in the current directory
  dockerBuildPath: .

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP
    type: object
    properties:
      log_level:
        type: string
        description: The logging level for the server (DEBUG, INFO, WARNING, ERROR)
        enum: ["DEBUG", "INFO", "WARNING", "ERROR"]
        default: "INFO"
      host:
        type: string
        description: The host address for WebSocket mode (not used in stdio mode)
        default: "localhost"
      port:
        type: integer
        description: The port number for WebSocket mode (not used in stdio mode)
        default: 8765
  commandFunction: |
    (config) => ({
      command: 'python',
      args: ['-m', 'src'],
      env: {
        LOG_LEVEL: config.log_level || 'INFO',
        MCP_SERVER_MODE: 'stdio',
        MCP_SERVER_HOST: config.host || 'localhost',
        MCP_SERVER_PORT: String(config.port || 8765)
      }
    }) 