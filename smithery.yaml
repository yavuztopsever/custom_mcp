name: custom-mcp-server
version: 1.0.0
description: Custom MCP server with code analysis, formatting, and documentation tools

deployment:
  type: python
  entrypoint: src.server_sse:app
  python_version: "3.11"
  requirements: requirements.txt
  environment:
    - HOST
    - PORT
    - LOG_LEVEL

scaling:
  min_instances: 1
  max_instances: 3
  target_cpu_utilization: 80

resources:
  cpu: "1"
  memory: "512Mi"

health:
  readiness_probe:
    http_get:
      path: /health
      port: 8000
    initial_delay_seconds: 5
    period_seconds: 10
  liveness_probe:
    http_get:
      path: /health
      port: 8000
    initial_delay_seconds: 15
    period_seconds: 20 