name: custom-mcp-server
version: 1.0.0
description: Custom MCP server with code analysis, formatting, and documentation tools

build:
  type: docker
  dockerfile: Dockerfile
  context: .

deployment:
  type: websocket
  port: 8000
  health:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 3

environment:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "8000"
  - name: LOG_LEVEL
    value: "INFO"
  - name: PYTHONUNBUFFERED
    value: "1"

resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "200m"
    memory: "256Mi"

scaling:
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

commandFunction: |
  function getCommand(config) {
    return {
      command: "python",
      args: ["-u", "-m", "src.server_sse"]
    };
  } 